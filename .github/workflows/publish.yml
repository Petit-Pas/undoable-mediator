name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/UndoableMediator/UndoableMediator.csproj
    - name: Build
      run: dotnet build src/UndoableMediator/UndoableMediator.csproj --no-restore
    - name: Package
      run: dotnet pack -c Release -o . src/UndoableMediator/UndoableMediator.csproj
    - name: Publish
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: dotnet nuget push *.nupkg -k "${{ secrets.NUGET_KEY }}" -s https://api.nuget.org/v3/index.json --skip-duplicate
